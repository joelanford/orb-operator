                          metadata. Keys must conform to the Kubernetes annotation key format.
                          Values are free-form strings up to 256 KiB each. A maximum of 32
                          annotations may be specified.
                        maxProperties: 32
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
