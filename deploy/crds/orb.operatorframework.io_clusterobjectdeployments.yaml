                                          - type
                                          type: object
                                        fieldValue:
                                          description: |-
                                            fieldValue checks that a single field on the object matches an expected
                                            value.
                                          properties:
                                            fieldPath:
                                              description: fieldPath is the JSON path
                                                to the field to check.
                                              maxLength: 512
                                              minLength: 1
                                              type: string
                                            value:
                                              description: |-
                                                value is the expected value of the field. An empty string is a valid
                                                expected value.
                                              maxLength: 1024
                                              type: string
                                          required:
                                          - fieldPath
                                          - value
                                          type: object
                                        fieldsEqual:
                                          description: fieldsEqual checks that two
                                            fields on the object have equal values.
                                          properties:
                                            fieldA:
                                              description: fieldA is the JSON path
                                                to the first field to compare.
                                              maxLength: 512
                                              minLength: 1
                                              type: string
                                            fieldB:
                                              description: fieldB is the JSON path
                                                to the second field to compare.
                                              maxLength: 512
                                              minLength: 1
                                              type: string
                                          required:
                                          - fieldA
                                          - fieldB
                                          type: object
                                      type: object
                                      x-kubernetes-validations:
                                      - message: exactly one of the fields in [conditionEqual
                                          fieldsEqual fieldValue celExpression] must
                                          be set
                                        rule: '[has(self.conditionEqual),has(self.fieldsEqual),has(self.fieldValue),has(self.celExpression)].filter(x,x==true).size()
                                          == 1'
                                    maxItems: 16
                                    type: array
                                  collisionProtection:
                                    description: |-
                                      collisionProtection overrides the phase-level collision protection
                                      setting for this specific object. When omitted, the phase-level setting
                                      applies.
                                    enum:
                                    - Prevent
                                    - IfNoController
                                    - None
                                    type: string
                                  object:
