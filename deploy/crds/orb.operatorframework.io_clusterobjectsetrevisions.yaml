---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: clusterobjectsetrevisions.orb.operatorframework.io
spec:
  group: orb.operatorframework.io
  names:
    kind: ClusterObjectSetRevision
    listKind: ClusterObjectSetRevisionList
    plural: clusterobjectsetrevisions
    shortNames:
    - cosr
    singular: clusterobjectsetrevision
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.group
      name: Group
      type: string
    - jsonPath: .spec.revision
      name: Revision
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Available")].status
      name: Available
      type: string
    - jsonPath: .spec.lifecycleState
      name: Lifecycle
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterObjectSetRevision represents an immutable snapshot of a set of
          Kubernetes objects to apply and manage on the cluster. Revisions within the
          same group form an ordered sequence.

          When a new revision is created, multiple revisions may be active
          simultaneously. During this transition the highest-numbered active revision
          reconciles its own objects and takes over ownership of objects shared with
          predecessor revisions. Objects that exist only in a predecessor remain under
          that predecessor's ownership until it is archived, at which point they are
          deleted.

          Deleting a revision without the orphan finalizer triggers a reverse-order
          teardown of its phases before the resource is removed.

          The group, revision number, phases, and collisionProtection fields are
          immutable after creation. Only lifecycleState may be updated.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              spec defines the desired state of this revision, including the objects to
              manage and their lifecycle configuration.
            properties:
              collisionProtection:
                description: |-
                  collisionProtection sets the default collision protection for all phases
                  and objects in the revision. Individual phases and objects may override
                  this setting. When omitted, the platform chooses a reasonable default,
                  which is subject to change over time. The current default is "Prevent".
                  Allowed values are "Prevent", "IfNoController", and "None".
                enum:
                - Prevent
                - IfNoController
                - None
                type: string
              group:
                description: |-
                  group is a label-safe identifier that links related revisions together.
                  All revisions sharing the same group form an ordered sequence. The value
                  must be at most 52 characters long.
                maxLength: 52
                minLength: 1
                type: string
              lifecycleState:
                description: |-
                  lifecycleState controls whether this revision is actively reconciling its
                  managed objects. Allowed values are "Active" and "Archived". An Active
                  revision reconciles and reports availability. Transitioning to Archived
                  triggers teardown (deletion) of any objects still owned by this revision;
                  phases are torn down in reverse order. Once a revision is archived, it
                  cannot be unarchived.
                enum:
                - Active
                - Archived
                type: string
              phases:
                description: |-
                  phases is the ordered list of phases that define the managed objects. The
                  list must contain between 1 and 20 phases. Phases are applied
                  sequentially: the controller does not advance to the next phase until all
                  objects in the current phase satisfy their assertions.
                items:
                  description: |-
                    Phase is an ordered group of objects that are applied together. Phases within
                    a revision are applied sequentially: the controller does not advance to the
                    next phase until all objects in the current phase satisfy their assertions.
                  properties:
                    collisionProtection:
                      description: |-
                        collisionProtection overrides the revision-level collision protection
                        setting for all objects in this phase. When omitted, the revision-level
                        setting applies.
                      enum:
                      - Prevent
                      - IfNoController
                      - None
                      type: string
                    name:
                      description: |-
                        name is a human-readable identifier for this phase. It is used in log
                        messages and status reporting. Must be a valid DNS-1035 label: lowercase
                        alphanumeric characters or '-', must start with a letter and end with
                        an alphanumeric character (e.g. "my-phase", "phase1").
                      maxLength: 63
                      minLength: 1
                      type: string
                      x-kubernetes-validations:
                      - message: 'name must be a valid DNS-1035 label: lowercase alphanumeric
                          or ''-'', starting with a letter, ending with an alphanumeric'
                        rule: self.matches('^[a-z]([a-z0-9-]*[a-z0-9])?$')
                    objects:
                      description: |-
                        objects is the list of Kubernetes objects to manage in this phase. The
                        list must contain between 1 and 50 objects.
                      items:
                        description: |-
                          PhaseObject wraps a single Kubernetes object with optional collision
                          protection and availability assertions.
                        properties:
                          assertions:
                            description: |-
                              assertions define conditions that must be met before this object is
                              considered available. A maximum of 16 assertions may be specified. When
                              omitted, the object is considered available immediately after successful
                              apply.
                            items:
                              description: |-
                                Assertion defines a single availability check that must pass before the
                                containing object is considered available. Exactly one of conditionEqual,
                                fieldsEqual, fieldValue, or celExpression must be set.
                              properties:
                                celExpression:
                                  description: |-
                                    celExpression evaluates a CEL expression against the object. The
                                    expression must evaluate to true for the assertion to pass.
                                  properties:
                                    expression:
                                      description: |-
                                        expression is a CEL expression that must evaluate to true for the
                                        assertion to pass. The managed object is available as "self" in the
                                        expression scope.
                                      maxLength: 4096
                                      minLength: 1
                                      type: string
                                    message:
                                      description: |-
                                        message is an optional human-readable explanation shown when the assertion
                                        fails. When omitted, the raw expression text is used in error messages.
                                      maxLength: 1024
                                      type: string
                                  required:
                                  - expression
                                  type: object
                                conditionEqual:
                                  description: |-
                                    conditionEqual checks that a status condition with the given type has the
                                    expected status value.
                                  properties:
                                    status:
                                      description: |-
                                        status is the expected value of the condition's status field. Allowed
                                        values are "True", "False", and "Unknown".
                                      enum:
                                      - "True"
                                      - "False"
                                      - Unknown
                                      type: string
                                    type:
                                      description: type is the condition type to match,
                                        for example "Available" or "Ready".
                                      maxLength: 316
                                      minLength: 1
                                      type: string
                                  required:
                                  - status
                                  - type
                                  type: object
                                fieldValue:
                                  description: |-
                                    fieldValue checks that a single field on the object matches an expected
                                    value.
                                  properties:
                                    fieldPath:
                                      description: fieldPath is the JSON path to the
                                        field to check.
                                      maxLength: 512
                                      minLength: 1
                                      type: string
                                    value:
                                      description: |-
                                        value is the expected value of the field. An empty string is a valid
                                        expected value.
                                      maxLength: 1024
                                      type: string
                                  required:
                                  - fieldPath
                                  - value
                                  type: object
                                fieldsEqual:
                                  description: fieldsEqual checks that two fields
                                    on the object have equal values.
                                  properties:
                                    fieldA:
                                      description: fieldA is the JSON path to the
                                        first field to compare.
                                      maxLength: 512
                                      minLength: 1
                                      type: string
                                    fieldB:
                                      description: fieldB is the JSON path to the
                                        second field to compare.
                                      maxLength: 512
                                      minLength: 1
                                      type: string
                                  required:
                                  - fieldA
                                  - fieldB
                                  type: object
                              type: object
                              x-kubernetes-validations:
                              - message: exactly one of the fields in [conditionEqual
                                  fieldsEqual fieldValue celExpression] must be set
                                rule: '[has(self.conditionEqual),has(self.fieldsEqual),has(self.fieldValue),has(self.celExpression)].filter(x,x==true).size()
                                  == 1'
                            maxItems: 16
                            type: array
                          collisionProtection:
                            description: |-
                              collisionProtection overrides the phase-level collision protection
                              setting for this specific object. When omitted, the phase-level setting
                              applies.
                            enum:
                            - Prevent
                            - IfNoController
                            - None
                            type: string
                          object:
                            description: |-
                              object is the Kubernetes resource to create or update. The controller
                              applies this object to the cluster and manages it for the lifetime of the
                              owning revision.
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                        required:
                        - object
                        type: object
                      maxItems: 50
                      minItems: 1
                      type: array
                  required:
                  - name
                  - objects
                  type: object
                maxItems: 20
                minItems: 1
                type: array
              revision:
                description: |-
                  revision is the monotonically increasing sequence number within the
                  group. The first revision is 1.
                format: int32
                minimum: 1
                type: integer
            required:
            - group
            - lifecycleState
            - phases
            - revision
            type: object
            x-kubernetes-validations:
            - message: group is immutable
              rule: self.group == oldSelf.group
            - message: revision is immutable
              rule: self.revision == oldSelf.revision
            - message: phases is immutable
              rule: self.phases == oldSelf.phases
            - message: collisionProtection is immutable
              rule: '!has(oldSelf.collisionProtection) && !has(self.collisionProtection)
                || has(oldSelf.collisionProtection) && has(self.collisionProtection)
                && self.collisionProtection == oldSelf.collisionProtection'
            - message: lifecycleState cannot transition from Archived
              rule: '!has(oldSelf.lifecycleState) || oldSelf.lifecycleState != ''Archived''
                || self.lifecycleState == ''Archived'''
          status:
            description: |-
              status reports the observed state of this revision, including availability
              conditions.
            properties:
              completedAt:
                description: |-
                  completedAt is the timestamp when all phases first completed
                  successfully. Set once and never cleared. Nil means the revision
                  has never been fully available. When set and Available is False,
                  the revision has regressed after a successful rollout.
                format: date-time
                type: string
              conditions:
                description: |-
                  conditions represent the latest available observations of the revision's
                  state. The "Available" condition indicates whether all managed objects in
                  this revision satisfy their assertions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedPhases:
                description: |-
                  observedPhases reports the observed state of each phase in the
                  revision. All phases from the spec are always listed, in spec
                  order. Each phase's status indicates whether the controller has
                  evaluated it and whether it has completed. The list may contain
                  at most 20 entries, matching the maximum number of spec phases.
                items:
                  description: ObservedPhase reports the observed state of a single
                    phase in the rollout.
                  properties:
                    error:
                      description: |-
                        error is a phase-level error message describing a validation or
                        configuration problem with the phase itself (as opposed to
                        individual objects). At most 1024 characters; longer messages
                        are truncated by the controller.
                      maxLength: 1024
                      type: string
                    incompleteObjects:
                      description: |-
                        incompleteObjects lists objects in this phase that are not
                        yet complete. For Reconciling phases, this includes probe
                        failures, collisions, creation/update errors, and any other
                        condition preventing completion. For TearingDown phases,
                        this lists objects still awaiting deletion. Each entry
                        identifies the object and carries failure messages. Empty
                        when status is Available, TeardownComplete, or Unknown.
                        The list may contain at most 50 entries, matching the maximum
                        number of objects per phase.
                      items:
                        description: ObjectStatus identifies a managed object and
                          its failure messages.
                        properties:
                          group:
                            description: |-
                              group is the API group of the object (empty string for core
                              resources). At most 253 characters (DNS subdomain max).
                            maxLength: 253
                            type: string
                          kind:
                            description: |-
                              kind is the kind of the object. Must be between 1 and 63
                              characters.
                            maxLength: 63
                            minLength: 1
                            type: string
                          messages:
                            description: |-
                              messages lists the failure reasons for this object. The maximum
                              of 17 entries accounts for up to 16 assertion probe failures
                              plus one collision message. Each message is at most 1024
                              characters; longer messages are truncated by the controller.
                            items:
                              maxLength: 1024
                              type: string
                            maxItems: 17
                            type: array
                          name:
                            description: |-
                              name is the name of the object. Must be between 1 and 253
                              characters (DNS subdomain max).
                            maxLength: 253
                            minLength: 1
                            type: string
                          namespace:
                            description: |-
                              namespace is the namespace of the object. Empty for cluster-scoped
                              resources. At most 253 characters (DNS subdomain max).
                            maxLength: 253
                            type: string
                          version:
                            description: |-
                              version is the API version of the object. Must be between 1 and
                              63 characters.
                            maxLength: 63
                            minLength: 1
                            type: string
                        required:
                        - kind
                        - name
                        - version
                        type: object
                      maxItems: 50
                      type: array
                    name:
                      description: |-
                        name is the name of the phase from the spec. Must be a valid DNS-1035
                        label: lowercase alphanumeric characters or '-', must start with a
                        letter and end with an alphanumeric character (e.g. "my-phase",
                        "phase1"), matching the Phase name constraints.
                      maxLength: 63
                      minLength: 1
                      type: string
                      x-kubernetes-validations:
                      - message: 'name must be a valid DNS-1035 label: lowercase alphanumeric
                          or ''-'', starting with a letter, ending with an alphanumeric'
                        rule: self.matches('^[a-z]([a-z0-9-]*[a-z0-9])?$')
                    status:
                      description: |-
                        status is the current state of this phase in the rollout. Must be
                        one of Reconciling, Available, Unknown, Superseded, TearingDown, or
                        TeardownComplete.
                      enum:
                      - Reconciling
                      - Available
                      - Unknown
                      - Superseded
                      - TearingDown
                      - TeardownComplete
                      type: string
                  required:
                  - name
                  - status
                  type: object
                maxItems: 20
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
            x-kubernetes-validations:
            - message: completedAt is immutable once set
              rule: '!has(oldSelf.completedAt) || has(self.completedAt)'
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
