version: 2

builds:
  - main: ./cmd/operator
    binary: orb-operator
    env:
      - CGO_ENABLED=0
      - GOFLAGS={{ if index .Env "GO_BUILD_FLAGS" }}{{ .Env.GO_BUILD_FLAGS }}{{ end }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

dockers_v2:
  - images:
      - ghcr.io/joelanford/orb-operator
    tags:
      - "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile

release:
  disable: true

snapshot:
  version_template: dev

changelog:
  disable: true
